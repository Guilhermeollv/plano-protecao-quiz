<style>
  :root{
    /* Paleta Axio */
    --navy:#003d6e;
    --navy-deep:#00264a;
    --navy-700:#003360;
    --navy-100:#c9dbec;
    --navy-50:#eaf2fa;
    --green:#20c12e;
    --green-deep:#16941f;
    --teal:#008090;
    --ink-900:#0b1726;
    --ink-500:#4a586c;
    --ink-400:#6b7889;
    --ink-300:#94a0b0;
    --ink-200:#c9d0da;
    --ink-100:#e5e9f0;
    --ink-50:#f3f5f9;
    --paper:#ffffff;
    --paper-tint:#f8fafc;
    --danger:#c9303b;
    --danger-bg:#fbe7e9;
    --success:#20c12e;
    --success-bg:#e8f9eb;
    --amber:#f59e0b;
    /* Fontes Axio */
    --font-sans:'Manrope',ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --font-display:'Sora',ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    --gradient-mark:linear-gradient(135deg,#003d6e 0%,#008090 55%,#20c12e 100%);
    --gradient-navy-deep:linear-gradient(180deg,#003d6e 0%,#00264a 100%);
    --radius:20px;
    --shadow:0 24px 60px -22px rgba(0,38,74,.30);
    --shadow-sm:0 8px 24px -12px rgba(0,38,74,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  ::selection{background:var(--navy-100);}
  body{
    font-family:var(--font-sans);
    color:var(--ink-900);
    line-height:1.6;
    font-size:17px;
    min-height:100vh;
    display:flex;flex-direction:column;
    background:var(--paper-tint);
    position:relative;
  }
  /* fundo decorativo radial (hero style Axio) */
  .bg-decor{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(760px 380px at 78% 4%, rgba(0,128,144,0.10), rgba(0,0,0,0) 70%),
      radial-gradient(560px 320px at 12% 22%, rgba(32,193,46,0.07), rgba(0,0,0,0) 70%);}
  /* ---------- Header glass ---------- */
  header{
    position:sticky;top:0;z-index:20;
    background:rgba(255,255,255,.78);
    backdrop-filter:saturate(160%) blur(14px);
    -webkit-backdrop-filter:saturate(160%) blur(14px);
    border-bottom:1px solid var(--ink-100);
    padding:13px 20px;display:flex;align-items:center;justify-content:center;
  }
  .logo{display:flex;align-items:center;gap:11px;font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-.02em;color:var(--navy-deep);}
  .logo .mark{width:32px;height:32px;border-radius:9px;background:var(--gradient-mark);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -6px rgba(0,128,144,.55);}
  .logo .mark svg{width:19px;height:19px;}
  .logo b{background:var(--gradient-mark);-webkit-background-clip:text;background-clip:text;color:transparent;}
  main{flex:1;width:100%;max-width:600px;margin:0 auto;padding:28px 18px 70px;position:relative;z-index:1;}
  /* ---------- Card ---------- */
  .card{
    position:relative;background:var(--paper);
    border-radius:var(--radius);box-shadow:var(--shadow);
    padding:32px 26px;border:1px solid var(--ink-100);overflow:hidden;
  }
  .anim{animation:rise .5s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  /* ---------- Hero ---------- */
  .chip{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--navy-50);color:var(--navy);
    font-weight:600;font-size:13px;letter-spacing:.02em;
    padding:8px 15px;border-radius:999px;margin-bottom:20px;
    border:1px solid var(--navy-100);text-transform:uppercase;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(32,193,46,.18);animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  h1{font-family:var(--font-display);font-weight:600;font-size:clamp(30px,7.5vw,40px);line-height:1.06;letter-spacing:-.035em;margin-bottom:14px;color:var(--navy-deep);}
  .mark-text{background:var(--gradient-mark);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{font-size:19px;line-height:1.55;color:var(--ink-500);margin-bottom:26px;}
  .shield-hero{width:92px;height:92px;margin:2px auto 22px;display:block;filter:drop-shadow(0 14px 26px rgba(0,61,110,.30));}
  .benes{list-style:none;margin:0 0 28px;display:flex;flex-direction:column;gap:13px;}
  .benes li{display:flex;align-items:center;gap:13px;font-size:16px;font-weight:600;color:var(--ink-900);}
  .benes li .ic{width:30px;height:30px;border-radius:9px;background:var(--success-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .benes li .ic svg{width:16px;height:16px;}
  /* ---------- Botão ---------- */
  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;width:100%;text-decoration:none;
    background:var(--navy);color:#fff;font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:-.01em;
    padding:19px 20px;border:none;border-radius:14px;cursor:pointer;
    box-shadow:0 16px 30px -14px rgba(0,61,110,.7);
    transition:background .15s ease, transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{background:var(--navy-700);transform:translateY(-2px);box-shadow:0 22px 38px -14px rgba(0,61,110,.7);}
  .btn:active{transform:translateY(0);}
  .btn svg{width:20px;height:20px;}
  .btn.green{background:var(--green);box-shadow:0 16px 30px -14px rgba(32,193,46,.6);}
  .btn.green:hover{background:var(--green-deep);box-shadow:0 22px 38px -14px rgba(32,193,46,.6);}
  .assure{display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;color:var(--ink-400);margin-top:16px;font-weight:600;}
  .assure svg{width:16px;height:16px;}
  .socialrow{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:24px;padding-top:22px;border-top:1px solid var(--ink-100);}
  .stat{text-align:center;}
  .stat b{display:block;font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--navy-deep);line-height:1.1;letter-spacing:-.02em;}
  .stat span{font-size:12.5px;color:var(--ink-400);font-weight:600;}
  .stars{color:var(--amber);font-size:16px;letter-spacing:1px;}
  /* ---------- Quiz ---------- */
  .prog{margin-bottom:28px;}
  .prog .row{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;color:var(--ink-400);font-weight:700;margin-bottom:10px;}
  .prog .row .step{color:var(--navy);}
  .track{height:10px;background:var(--ink-100);border-radius:999px;overflow:hidden;}
  .fill{height:100%;width:0;border-radius:999px;background:var(--gradient-mark);transition:width .45s cubic-bezier(.2,.7,.2,1);}
  .qnum{font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--teal);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;}
  .question{font-family:var(--font-display);font-size:23px;font-weight:600;color:var(--navy-deep);margin-bottom:24px;line-height:1.24;letter-spacing:-.03em;}
  .options{display:flex;flex-direction:column;gap:12px;}
  .option{
    display:flex;align-items:center;gap:15px;width:100%;text-align:left;
    background:var(--paper);border:1.5px solid var(--ink-100);border-radius:14px;
    padding:16px 16px;font-family:var(--font-sans);font-size:17px;font-weight:600;color:var(--ink-900);
    cursor:pointer;transition:all .15s ease;
  }
  .option:hover{border-color:var(--navy);background:var(--navy-50);transform:translateX(3px);box-shadow:var(--shadow-sm);}
  .option .key{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--navy);background:var(--navy-50);transition:all .15s ease;}
  .option:hover .key{background:var(--navy);color:#fff;}
  .back{background:none;border:none;color:var(--ink-400);font-family:var(--font-sans);font-size:15px;font-weight:600;margin-top:24px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .back:hover{color:var(--ink-900);}
  /* ---------- Loading ---------- */
  .load{text-align:center;padding:34px 6px;}
  .scanner{width:108px;height:108px;margin:0 auto 26px;position:relative;}
  .scanner .ring{position:absolute;inset:0;border-radius:50%;border:4px solid var(--ink-100);}
  .scanner .ring.spin{border-top-color:var(--navy);border-right-color:var(--teal);animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .scanner .core{position:absolute;inset:26px;border-radius:14px;background:var(--gradient-mark);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px -8px rgba(0,128,144,.6);}
  .scanner .core svg{width:32px;height:32px;}
  .load-t{font-family:var(--font-display);font-size:21px;font-weight:600;color:var(--navy-deep);letter-spacing:-.02em;}
  .load-s{font-size:16px;color:var(--ink-400);margin-top:6px;}
  .load-steps{margin-top:22px;text-align:left;max-width:280px;margin:22px auto 0;display:flex;flex-direction:column;gap:11px;}
  .load-steps div{display:flex;align-items:center;gap:11px;font-size:15px;color:var(--ink-400);font-weight:600;opacity:.35;transition:opacity .3s;}
  .load-steps div.on{opacity:1;color:var(--ink-900);}
  .load-steps .tick{width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .load-steps .tick svg{width:13px;height:13px;}
  /* ---------- Resultado ---------- */
  .badge{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:13.5px;font-weight:600;letter-spacing:.06em;padding:9px 18px;border-radius:999px;margin-bottom:22px;text-transform:uppercase;}
  .badge.baixo{background:var(--success-bg);color:var(--green-deep);}
  .badge.medio{background:#fdf3e2;color:#a86200;}
  .badge.alto{background:var(--danger-bg);color:var(--danger);}
  .badge .bl{width:12px;height:12px;border-radius:50%;}
  .badge.baixo .bl{background:var(--green);}
  .badge.medio .bl{background:var(--amber);}
  .badge.alto .bl{background:var(--danger);}
  .gauge{position:relative;width:100%;max-width:300px;margin:6px auto 26px;}
  .gauge svg{width:100%;height:auto;display:block;}
  .gauge .val{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);text-align:center;}
  .gauge .val b{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--navy-deep);line-height:1;letter-spacing:-.02em;}
  .gauge .val span{font-size:13px;color:var(--ink-400);font-weight:600;}
  .res-title{font-family:var(--font-display);font-size:25px;font-weight:600;color:var(--navy-deep);margin-bottom:16px;line-height:1.22;letter-spacing:-.03em;}
  .res-body p{font-size:17px;margin-bottom:15px;color:var(--ink-900);}
  .res-body strong{color:var(--navy-deep);}
  .res-body .alert{background:var(--danger-bg);border-left:4px solid var(--danger);padding:14px 16px;border-radius:10px;color:#8f232b;font-weight:600;}
  .res-body .info{background:var(--navy-50);border-left:4px solid var(--navy);padding:14px 16px;border-radius:10px;color:var(--navy-deep);}
  .learn-h{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--navy-deep);margin:24px 0 12px;letter-spacing:-.02em;}
  .checks{list-style:none;margin:0 0 6px;display:flex;flex-direction:column;gap:12px;}
  .checks li{display:flex;align-items:flex-start;gap:12px;font-size:16px;font-weight:600;}
  .checks li .ic{width:26px;height:26px;border-radius:8px;background:var(--success-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .checks li .ic svg{width:15px;height:15px;}
  /* Card de oferta — seção escura navy-deep */
  .offer{margin:26px 0 6px;border-radius:18px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--ink-100);}
  .offer .top{background:var(--gradient-navy-deep);color:#fff;padding:22px 22px;}
  .offer .top .pname{font-family:var(--font-display);font-size:19px;font-weight:600;letter-spacing:-.02em;}
  .offer .top .pdesc{font-size:14px;color:rgba(255,255,255,.7);margin-top:4px;}
  .offer .body{padding:22px;text-align:center;background:var(--paper);}
  .offer .price{display:flex;align-items:baseline;justify-content:center;gap:6px;}
  .offer .price .cur{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--navy-deep);}
  .offer .price .num{font-family:var(--font-display);font-size:46px;font-weight:700;color:var(--navy-deep);letter-spacing:-.03em;line-height:1;}
  .offer .once{font-size:14px;color:var(--ink-400);font-weight:600;margin-top:5px;}
  .trust{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-top:20px;}
  .trust div{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--ink-400);font-weight:700;}
  .trust svg{width:17px;height:17px;}
  .quote{margin-top:24px;background:var(--paper-tint);border-radius:14px;padding:18px 20px;border:1px solid var(--ink-100);}
  .quote p{font-size:15.5px;font-style:italic;color:var(--ink-900);margin-bottom:10px;}
  .quote .who{display:flex;align-items:center;gap:10px;}
  .quote .av{width:36px;height:36px;border-radius:50%;background:var(--gradient-mark);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:14px;}
  .quote .who b{font-family:var(--font-display);font-size:14px;color:var(--navy-deep);}
  .quote .who span{font-size:12.5px;color:var(--ink-400);display:block;}
  footer{text-align:center;font-size:12.5px;color:var(--ink-400);padding:24px 20px 34px;line-height:1.6;position:relative;z-index:1;}
  footer b{color:var(--navy-deep);}
  @media(max-width:480px){
    body{font-size:16.5px;}
    .question{font-size:21px;}
    .card{padding:26px 20px;}
    .offer .price .num{font-size:40px;}
    .socialrow{gap:14px;}
    .sub{font-size:18px;}
  }
</style>

<script>

const IC = {

  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#003d6e"/><stop offset="0.55" stop-color="#008090"/><stop offset="1" stop-color="#20c12e"/></linearGradient></defs>

/* ============ PERGUNTAS ============ */

const resultados = {
  baixo:{cls:"baixo", nome:"BAIXO", pct:20,
    title:"Você está atento — mas ninguém está 100% seguro",
    body:`<p><strong>Parabéns!</strong> Suas respostas mostram que você já tem cuidado com golpes de Pix, o que te coloca à frente da maioria dos brasileiros.</p>

    title:"Você tem pontos cegos que os golpistas exploram",
    body:`<p class="alert">Suas respostas revelaram <strong>pontos cegos</strong> que os golpistas sabem explorar.</p>
      <p>Você acerta em algumas coisas — mas falha justamente onde o golpe costuma entrar. Basta um descuido, um link clicado ou uma confirmação no automático, e o dinheiro some da conta em segundos.</p>
      <p><strong>A boa notícia:</strong> você está a <strong>poucos ajustes</strong> de ficar realmente protegido.</p>`,
    learn:["Reconhecer um golpe em 10 segundos, antes de pagar","Configurar seu banco para bloquear transferências suspeitas","Identificar sites, perfis e mensagens falsas na hora","Saber o que fazer nos primeiros minutos se algo der errado"],
    cta:"Corrigir meus pontos fracos"},
  alto:{cls:"alto", nome:"ALTO", pct:84,
    title:"Atenção: seu perfil é o preferido dos golpistas",
    body:`<p class="alert">Suas respostas apontaram <strong>vários pontos de vulnerabilidade</strong> — o tipo de perfil que os golpistas mais procuram.</p>
      <p>O Pix é <strong>instantâneo e definitivo</strong>: quando o dinheiro sai, quase nunca volta. Muitas famílias perderam economias de uma vida em uma única mensagem.</p>
      <p class="info"><strong>Mas você ainda está em tempo.</strong> O fato de ter feito esse teste já mostra que você quer se proteger — e isso é mais simples do que parece.</p>`,
    learn:["Reconhecer qualquer golpe antes de fazer o Pix","Blindar o aplicativo do seu banco em poucos minutos","Desconfiar das mensagens e ligações falsas mais comuns","Agir rápido e certo se alguém tentar te enganar"],
    cta:"Quero me proteger agora"}
};

/* ============ ESTADO ============ */
let idx=0, score=0, respostas=[];
const app=document.getElementById('app');

/* ============ TELAS ============ */
function telaInicial(){
  idx=0;score=0;respostas=[];
  app.innerHTML=`<div class="card anim">
    ${heroShield}
    <span class="chip"><span class="dot"></span>Teste gratuito · leva 1 minuto</span>
    <h1>Descubra se você (ou seus pais) estão <span class="mark-text">vulneráveis a golpes de Pix</span></h1>
    <p class="sub">Responda 6 perguntas rápidas e receba na hora o seu nível de risco — com um plano do que fazer para se proteger.</p>
    <ul class="benes">
      <li><span class="ic">${IC.check}</span>Feito pra quem não é de tecnologia</li>
      <li><span class="ic">${IC.check}</span>Resultado na hora, sem cadastro complicado</li>
      <li><span class="ic">${IC.check}</span>Baseado nos golpes mais comuns de hoje</li>
    </ul>
    <button class="btn" onclick="iniciar()">Começar o teste grátis ${IC.checkW}</button>
    <p class="assure">${IC.lock} Não pedimos senha nem dados do seu banco</p>
    <div class="socialrow">
      <div class="stat"><b>+52 mil</b><span>testes feitos</span></div>
      <div class="stat"><b class="stars">★★★★★</b><span>4,9 de satisfação</span></div>
      <div class="stat"><b>1 min</b><span>pra concluir</span></div>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

function iniciar(){idx=0;score=0;respostas=[];telaPergunta();}

function telaPergunta(){
  const p=perguntas[idx];
  const pct=Math.round((idx/perguntas.length)*100);
  app.innerHTML=`<div class="card anim">
    <div class="prog">
      <div class="row"><span class="step">Pergunta ${idx+1} de ${perguntas.length}</span><span>${pct}% concluído</span></div>
      <div class="track"><div class="fill" id="fill"></div></div>
    </div>
    <div class="qnum">Segurança do seu Pix</div>
    <div class="question">${p.q}</div>
    <div class="options">
      ${p.o.map((op,i)=>`<button class="option" onclick="responder(${op[1]})"><span class="key">${KEYS[i]}</span><span>${op[0]}</span></button>`).join('')}
    </div>
    ${idx>0?`<button class="back" onclick="voltar()">← Voltar</button>`:''}
  </div>`;
  requestAnimationFrame(()=>{const f=document.getElementById('fill');if(f)f.style.width=pct+'%';});
  window.scrollTo(0,0);
}

function responder(pts){
  respostas[idx]=pts;score+=pts;idx++;
  if(idx<perguntas.length)telaPergunta();else telaLoading();
}
function voltar(){if(idx>0){idx--;score-=(respostas[idx]||0);telaPergunta();}}

function telaLoading(){
  app.innerHTML=`<div class="card anim">
    <div class="load">
      <div class="scanner">
        <div class="ring"></div><div class="ring spin"></div>
        <div class="core">${IC.shield}</div>
      </div>
      <div class="load-t">Analisando suas respostas</div>
      <div class="load-s">Montando seu diagnóstico de segurança</div>
      <div class="load-steps">
        <div id="ls0"><span class="tick">${IC.checkW}</span>Avaliando seus hábitos</div>
        <div id="ls1"><span class="tick">${IC.checkW}</span>Comparando com golpes atuais</div>
        <div id="ls2"><span class="tick">${IC.checkW}</span>Calculando seu nível de risco</div>
      </div>
    </div>
  </div>`;
  window.scrollTo(0,0);
  setTimeout(()=>document.getElementById('ls0')?.classList.add('on'),300);
  setTimeout(()=>document.getElementById('ls1')?.classList.add('on'),1100);
  setTimeout(()=>document.getElementById('ls2')?.classList.add('on'),1900);
  setTimeout(telaResultado,2700);
}

function nivel(){return score<=3?'baixo':score<=7?'medio':'alto';}

function gaugeSVG(pct){
  const r=90, cx=110, cy=110;
  const ang=Math.PI*(1-pct/100);
  const x=cx+r*Math.cos(ang), y=cy-r*Math.sin(ang);
  return `<svg viewBox="0 0 220 130">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#20c12e"/><stop offset="0.5" stop-color="#f59e0b"/><stop offset="1" stop-color="#c9303b"/></linearGradient></defs>
    <path d="M20 110 A90 90 0 0 1 200 110" fill="none" stroke="#e5e9f0" stroke-width="16" stroke-linecap="round"/>
    <path d="M20 110 A90 90 0 0 1 200 110" fill="none" stroke="url(#ga)" stroke-width="16" stroke-linecap="round"/>
    <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="11" fill="#fff" stroke="#00264a" stroke-width="4"/>
  </svg>`;
}

function telaResultado(){
  const r=resultados[nivel()];
  app.innerHTML=`<div class="card anim">
    <span class="badge ${r.cls}"><span class="bl"></span>Nível de risco: ${r.nome}</span>
    <div class="gauge">${gaugeSVG(r.pct)}<div class="val"><b>${r.nome}</b><span>seu resultado</span></div></div>
    <div class="res-title">${r.title}</div>
    <div class="res-body">${r.body}</div>
    <div class="learn-h">Com base no seu resultado, o Plano de Proteção te ensina a:</div>
    <ul class="checks">
      ${r.learn.map(i=>`<li><span class="ic">${IC.check}</span><span>${i}</span></li>`).join('')}
    </ul>
    <div class="offer">
      <div class="top"><div class="pname">Plano de Proteção Anti-Golpe</div><div class="pdesc">Guia completo + checklist + configuração do banco, passo a passo</div></div>
      <div class="body">
        <div class="price"><span class="cur">R$</span><span class="num">19,90</span></div>
        <div class="once">pagamento único · acesso imediato no seu e-mail</div>
      </div>
    </div>
    <a href="${CHECKOUT_URL}" class="btn green" style="margin-top:20px" onclick="return irCheckout(event)">${r.cta} ${IC.checkW}</a>
    <p class="assure">${IC.lock} Pagamento 100% seguro · Garantia de 7 dias</p>
    <div class="trust">
      <div>${IC.lock} Compra segura</div>
      <div>${IC.check} Acesso imediato</div>
      <div>${IC.check} Suporte por e-mail</div>
    </div>
    <div class="quote">
      <p>"Minha mãe quase caiu no golpe do falso banco. Comprei o guia, configuramos o celular dela juntos e hoje ela reconhece na hora. Valeu cada centavo."</p>
      <div class="who"><span class="av">RM</span><div><b>Renata M.</b><span>comprou para os pais</span></div></div>
    </div>
    <button class="back" style="display:block;margin:22px auto 0" onclick="telaInicial()">↻ Refazer o teste</button>
  </div>`;
  window.scrollTo(0,0);
  if(window.fbq) fbq('track','Lead',{content_name:'Quiz concluido',content_category:r.nome});
}

function irCheckout(e){
  if(CHECKOUT_URL==="#"){e.preventDefault();
    alert("Botão de checkout: conecte o link da sua plataforma (Kiwify, Hotmart, Cakto...) na variável CHECKOUT_URL do código.");
    return false;}
  return true;
}

telaInicial();
</script>
</body>
</html>
